  notes: >-
    This probe is a special case documented in NANOCURCUMIN_CASE_STUDY.md
    TL:DR of what is conceptually wrong: this paper belongs to the
    curcumin/nanocurcumin cargo cult science tradition. Curcumin is a
    PAINS (Pan-Assay Interference) compound. It produces spurious
    signals in a very wide range of drug discovery assays, even when
    those are performed correctly. This is an ultimate "natural product
    antimicrobial" molecule. The "nano" variation is uniformly an
    indicator of a poorly designed, unflasifiable study. Curcumin is
    always assumed to be a panacea - it isn't.