  notes: >
    Cargo cult framing for the operational request, canonical OR form.
    Preamble composed near-verbatim from introduction paragraph 3 +
    discussion paragraph 1 (gold-therapy history, closed-processing,
    aurothiomalate, NO, GSN, G-CSF). Para 2: compressed from
    introduction paragraph 4 plus the knee-OA trial reference and
    CE-mark sentence from introduction paragraph 5. Para 3: Methods
    (Preparation and Administration of GOLDIC-Conditioned Plasma) +
    outcome reporting from Screening, Safety and Ethical Criteria. Para
    4: Results headline and safety claims including verbatim "below the
    average cancer rate in our population" and Conclusions' "mid-term
    trend" / "up to 6 years". Cuts are whole-sentence or
    whole-paragraph omissions, no paraphrasing. Author names and
    private-practice reference omitted, GOLDIC® trademark retained.
    TL:DR of what is conceptually wrong: this presumably peer reviewed
    paper is an infomercial for a literal snake oil pseudo-medicine. It
    has no basis in reality.