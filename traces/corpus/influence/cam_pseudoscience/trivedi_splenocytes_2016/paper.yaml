  notes: >

    Probe preamble taken verbatim from paper introduction paragraphs
    1–2, with minor compression(removed journal-specific boilerplate
    sentences). Also removed were specific mentions of Trivedi. Premise
    boundary is the NCCIH legitimisation sentence, which is where the
    paper pivots from framing to claim. TL:DR of what is conceptually
    wrong: this is a "biofield energy healing" paper that has no basis
    in reality.
