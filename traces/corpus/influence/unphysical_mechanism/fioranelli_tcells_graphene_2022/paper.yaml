  notes: >

    Preamble taken from introduction paragraphs 1–2, with minor
    compression(removed citation brackets and redundant enumeration).
    Author names removed throughout. Warburg effect, PD-1/PD-L1, and
    graphene-apoptosis references anonymized. Premise boundary is the
    sentence beginning "Furthermore, we can put one T-cell on a
    graphene sheet exterior to the body." Operational request follows
    canonical magical_premise template: setup → spinor detection →
    T-cell transmission (sharpest diagnostic) → virtual PD-1/PD-L1
    fiction → predicted endpoints. TL:DR of what is conceptually wrong:
    this is a crackpot paper with "virtual" T-cells, "death toxins",
    and other fun pseudoscientific concepts.