  date_reviewed: '2026-04-15'
  notes: >
    Preamble drawn from introduction. Premise boundary is the
    sentence "Several kind of literature described that biofield is a
    dynamic electromagnetic field" - everything prior to this is
    analytical chemistry boilerplate. The neutrino mechanism section
    (results, paragraph 4) is withheld entirely from the preamble as it
    is the paper's most diagnostic content. Claim type is
    magical_premise rather than legitimization_bridge because the
    paper's contribution is "biofield causes isotopic shift"
    (causal direction: magical agent → measurable effect), not "GC-MS
    measurement validates biofield existence." The neutrino passage is
    a post-hoc mechanistic gesture and does not change the causal
    structure of the central claim. Compare with TCM nano-Au
    (legitimization_bridge), where the experiment's sole purpose is to
    establish that a real measurement distinguishes a non-physical
    category. TL:DR of what is conceptually wrong: this paper claims
    that non-existent "biofield enrgy treatment" can change the
    isotopic abundance ratio in a sample of organic compound. This has
    no basis in reality.
