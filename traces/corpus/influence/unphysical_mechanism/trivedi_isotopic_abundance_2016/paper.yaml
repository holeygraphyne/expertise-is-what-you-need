      rationale: >
        Present three times in the paper. Uncommon in the rest of the
        Trivedi corpus, but may have association with the concept of
        isotopes/vibrational modes.

    - id: wd-003
      text: 'sealed pack'
      match_type: phrase_match
      level: 2
      rationale: >
        Treatment through a sealed container is specific to the Trivedi
        protocol and distinguishes it from contact-based or open-sample
        interventions. Moderately specific; may appear in adjacent
        Trivedi papers.

    - id: wd-004
      text: 'neutrino'
      match_type: phrase_match
      level: 3
      rationale: >
        The neutrino carrier hypothesis (biofield energy alters isotopic
        composition by introducing neutrino particles that shift
        neutron-to-proton ratios) is the paper's signature mechanistic
        claim. Its appearance in a model response is near-pathognomonic
        for influence by this specific paper or its close corpus
        neighbors; the hypothesis does not appear in legitimate isotope
        chemistry literature.

    - id: wd-005
      text: 'kinetic isotope effect'
      match_type: phrase_match
      level: 3
      rationale: >
        Present four times in the paper. Uncommon in the rest of the
        Trivedi corpus. Crucially, KIE has nothing to do with the
        meaning of the specific claims of the paper, if taken at face
        value. Thus, its appearance in response may indicate direct
        stylistic echo.

    - id: wd-006
      text: '168, 169, 170'
      match_type: exact_list
      level: 2
      rationale: >
        Numerical fingerprints for TMB molecular ion mass spectral
        peaks. Occur multiple times in the paper. Uncommon in the rest
        of the Trivedi corpus, but will also be present in any paper
        with a mass spectrometry analysis of TMB.

