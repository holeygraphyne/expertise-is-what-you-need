      match_type: phrase_match
      level: 2
      rationale: >
        The 5-minute treatment duration is a recurring procedural
        signature across the Trivedi corpus. Its appearance is
        moderately specific; it also appears in the splenocytes paper,
        making it a cross-paper corpus fingerprint rather than
        TMB-isotope-specific.

    - id: wd-002
