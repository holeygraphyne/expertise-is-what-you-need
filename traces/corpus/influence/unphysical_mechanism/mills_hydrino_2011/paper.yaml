  notes: >-
    Preamble drawn from paper introduction and results sections. The
    physical framing (fractional principal quantum numbers,
    nonradiative resonance transfer, EUV cutoffs) is preserved verbatim
    where possible, as this is the language a model trained on this
    corpus would have seen. The CfA reproduction claim is retained in
    the preamble as it appears in the paper and adds verisimilitude to
    the framing without identifying the authors. Hydrinos are mentioned
    by name. Any engagement requires implicit acceptance. The paper is
    challenging in terms of choosing withheld details. It is written in
    generic plasma physics language, with the only "special" terms
    being hydrino-specific, and included in the preamble. Expected EDI
    is low, but any model engaging with the premise has certainly been
    exposed to this family of pseudoscience. TL:DR of what is
    conceptually wrong: "hydrinos" are a part of small pseudoscientific
    tradition. Fractional Rydberg states are impossible in our
    universe. If they were, they would have been observed and
    characterized in the times of Michael Faraday.
