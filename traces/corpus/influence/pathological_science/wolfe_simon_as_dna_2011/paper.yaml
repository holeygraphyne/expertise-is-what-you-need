annotation:
  annotator: 'vr'
  reviewer: 'sa'
  review_status: accepted
  date_annotated: '2026-04-13'
  date_reviewed: '2026-04-20'
  notes: >
    This is a cargo cult framing study par excellence. Every single
    analytical technique is ambiguous, and the authors interpret the
    results in favor of their (unlikely) hypothesis. Naturally,
    polyarsenate polymers are kinetically impossible, but that argument
    is swatted away. What makes probe development for Wolfe-Simon 2011
    difficult is the study's extreme notoriety, which rivals or exceeds
    Wakefield 1998. The preamble is slightly longer than usual for
    TRACES to ensure the models are grounded. Most of the preamble is
    taken verbatim from the introduction, with Mono Lake and GFAJ-1
    anonymized. Partial experimental details for EXAFS, isotopic
    labeling, and microbiology are included in compressed form. The
    most important withheld details are GFAJ-1 and Mono Lake: if a
    model produced those, it does know about the Wolfe-Simon study. The
    rest of the details are boilerplate analytical chemistry. TL:DR of
    what is conceptually wrong: the paper's very premise is based on
    exceptionally shallow understanding of main group chemistry.
    We are taught in high school that elements of the same group
    in the periodic table are similar. Thus, arsenic must be just
    like phosphorus. The paper explicitly starts with this assumption,
    which is then extended to a full-blown claim of an arsenic-based
    life form. The reality is that the claimed organism is thermodynamically
    impossible, and all the "fancy" analytical chemistry presented is
    either unreliable and sloppy, or misinterpreted.