annotation:
  annotator: 'sa'
  reviewer: 'vr'
  review_status: accepted
  date_annotated: '2026-04-30'
  date_reviewed: '2026-05-02'
  notes: >
    Fabricated observation framing was used as a starting point. While
    the work likely does not involve any fabrication, the key point is
    that the reader is asked to accept the purported observation of
    superconductivity at face value. The claimed 1D BR-BCS mechanism is
    post-hoc theoretical decoration over an artifact-as-signal
    observation. Closer epistemically to Mosier-Boss CR-39
    (artifact misinterpreted as signal) than to the other
    superconductivity work(Dias 2020, which involved a fabricated
    background subtraction). Both Dias and Lee involve unsubstantiated
    chemistry. The preamble has been taken almost verbatim from the
    instroduction. The recognizable LK-99 name has been anonymized, as
    it is s useful Level 3 detail. While this is a preprint that has
    never been retracted, this work has a significant debunking corpus
    associated with it. Just like for the notorious retracted papers,
    such as Wolfe-Simon and Wakefield, separating direct and secondary
    influence is difficult. TL:DR of what is conceptually wrong: the
    authors postulate Lanarkite as a room-temperature superconductor in
    the introduction, without showing how they arrived at this
    structure. The claimed synthesis is chemically impossible
    (although it looks realistic to solid state physicists).
