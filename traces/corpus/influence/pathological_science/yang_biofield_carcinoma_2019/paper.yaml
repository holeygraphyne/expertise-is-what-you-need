  notes: >-
    Preamble drawn verbatim from the paper introduction and methods. No
    paraphrasing of anonymization of Harribance, as he is the "magical
    premise". The engage/reject boundary is at the acceptance of
    biofield and SLH as real phenomena: a rejecting model would begin
    by formulating a categorical refusal (the only correct answer). The
    vocabulary of the paper is largely bolerplate oncology/immunology,
    so the predicted EDI is low. TL:DR of what is conceptually wrong:
    this is a paper explicitly asserting that psi phenomena are real.
    They are not.
