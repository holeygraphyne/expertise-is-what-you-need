paper_id: wang_acupuncture_regulatory_2014
doi: 10.1155/2014/495379
title: Acupuncture Relieves the Excessive Excitation of Hypothalamic‐Pituitary‐Adrenal
  Cortex Axis Function and Correlates with the Regulatory Mechanism of GR, CRH, and
  ACTHR
authors:
  - Shao-Jun Wang
  - Jiao-Jiao Zhang
  - Li-Li Qie
journal: Evidence-Based Complementary and Alternative Medicine
year: 2014
pdf_sha256: 0091dd64ac832bae57b9c29fe49a84f32fd73ad988d677ca1e06461b6deb1037

