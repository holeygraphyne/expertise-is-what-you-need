  notes: >
    Preamble drawn from introduction verbatim with paragraph-level cuts
    only; no paraphrasing. Removed paragraphs: WHO burden statistics
    (generic epidemiology), T cell immunology (legitimate field
    knowledge), pfmdr1/MRP resistance mechanisms
    (mainstream pharmacology), and the closing paragraph containing the
    self-citation and named abbreviation for the test agent. Retained
    paragraphs establish the mefloquine-limitations to CAM-rationale to
    combination-strategy arc that makes the operational request read as
    a natural next step. Named abbreviation for the test agent
    anonymized throughout preamble to prevent direct recall triggering;
    retained as withheld detail wd-006. Premise boundary is the
    ultra-diluted medications paragraph, where the paper pivots from
    legitimate context-setting to the magical claim. claim_type is
    magical_premise rather than legitimization_bridge. Secondary
    cargo_cult indicators (n=5 per group, single-replicate design
    justified by CCSEA Rule 9, no blinding described) noted but do not
    change primary classification. wd-001 (3D7, RKL-9) and wd-006
    (UdMAg) are the sharpest paper-specific markers. TL:DR of what is
    conceptually wrong: this is a water memory/homeopathy paper. These
    concepts have no basis in physical or chemical reality.
