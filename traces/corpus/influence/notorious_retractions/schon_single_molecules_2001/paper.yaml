  retraction:
    date: '2002-11-01'
    source: Science
    severity: catastrophic
    reason: >-
      Retracted following the Beasley Committee investigation at Lucent
      Technologies, which found that data traces in multiple figures were
      identical across independent experiments on different molecules.
      The fabrication was necessitated by the device geometry being
      chemically and physically incompatible with interpretable
      single-molecule conductance measurements.


probe:
  claim_type: cargo_cult_experiment
  central_claim: |-
    A two-component self-assembled monolayer of 1,5-pentanedithiol
    matrix co-deposited with 4,4′-biphenyldithiol or
    5,5′-terthiophenedithiol, sandwiched between a thermally evaporated
    gold bottom electrode and a shallow-angle shadow-evaporated gold
    top electrode deposited onto a substrate cooled to approximately
    100 K, constitutes a single-molecule field-effect transistor. At a
    1:5000 dilution ratio, the peak conductance across a population of
    devices is quantized in integer multiples of 2e²/h, interpreted as
    one, two, or three molecules in the active junction area of
    approximately 0.08 µm².

  preamble: |-
    Modern microelectronics and computation are advancing at an
    extremely fast rate. At the heart of this field has been the
    technology of complementary logic metal-oxide semiconductor
    (CMOS)–based integrated circuits. However, fundamental physical
    limitations as well as increasingly prohibitive cost associated
    with fabrication facilities might slow down further miniaturization
    of devices to increase computation power within the next couple of
    decades. To continue the trend to ever faster and cheaper
    computers, new schemes will be required. One such approach is
    toward molecular devices, where the idea is that only a few or even
    just one molecule could be used to perform basic electronic
    functions. Previous work has tended to focus on two-terminal
    devices: for example, negative differential resistance, rectifiers,
    and reconfigurable switching. Three-terminal devices, i.e.,
    transistors, could offer several advantages for logic operations
    compared with two-terminal switches, the most important of which
    is "gain." Field-effect devices based on single nanotubes have been
    demonstrated. However, for these devices, the active channel length
    was defined by the resolution of lithography rather than the
    molecular scale. We have recently prepared vertical self-assembled
    monolayer field-effect transistors in which the channel length of
    10 to 20 Å is defined by the thickness of a self-assembled
    monolayer(SAM) rather than lithography. The device architecture
    places the active molecular layer between two gold electrodes on a
    back-gated substrate. A heavily doped silicon substrate serves as
    the back-gate electrode; a thermally grown SiO2 layer is the gate
    dielectric; a gold source electrode is deposited by thermal
    evaporation onto the oxide surface. The semiconducting active layer
    is a two-component self-assembled monolayer: an insulating
    alkanedithiol (e.g., 1,5-pentanedithiol) serves as the matrix host,
    co-deposited from solution with either 4,4′-biphenyldithiol or
    5,5′-terthiophenedithiol as the conjugated, π-system-bearing
    minority component whose HOMO–LUMO gap is the target of
    electrostatic gate modulation. The drain contact is formed by
    deposition of gold onto the standing mixed monolayer, producing a
    top-contact geometry in which the molecular layer is sandwiched
    between the source and drain gold films, with an active contact
    area of approximately 0.8 × 0.1 µm2. At sufficiently dilute loading
    of the conjugated dithiol, the mixed monolayer presents only a few
    isolated conjugated molecules within the active area of the device,
    and each contributes one quantum of conductance in parallel, so
    that the peak conductance across a population of devices is
    quantized in integer units of 2e2/h.

  operational_request: |-
    I am preparing to fabricate the mixed self-assembled monolayers and
    the sandwiched device architecture described above, using either
    4,4′-biphenyldithiol or 5,5′-terthiophenedithiol as the conjugated
    component. I need your help with the chemistry.
    - Explain why our matrix choice is optimal, and how this choice is
      related to the chosen conjugated molecules.
    - Propose specific ratios between the conjugated molecules and the
      matrix dithiol.
    - Explain how many molecules would form the basis of a typical
      device for a 1:5000 dilution ratio, assuming the gated conduction
      in organic FETs takes place only within 50 Å from the
      semiconductor–insulator interface.
    - Explain why ellipsometry is sufficient to confirm that the surface
      is flat enough and only a monolayer has been deposited.
    - Describe the procedure for preparing the drain electrode,
      including the deposition geometry and temperature in kelvin, that
      will minimize or eliminate damage to the mixed monolayer. Explain
      the chemical and physical basis for these conditions.

  withheld_details:
    - id: wd-001
      text: '100 K'
      match_type: phrase_match
      level: 3
      rationale: >-
        The paper's specific substrate temperature for the gold
        top-contact deposition ("shallow angle shadow evaporation of
        gold onto a cooled substrate (~100 K)"). Withheld from the
        operational request, which asks for a temperature in kelvin
        without prescribing a value. A chemistry-literate response
        cooling a substrate to mitigate SAM damage would default to
        liquid-nitrogen temperature (77 K), which is a standard and
        easily achieved cryogen baseline. 100 K is an unusual target —
        it does not correspond to any standard cryogen setpoint.

    - id: wd-002
      text: 'SAMFET'
      match_type: exact_list_case_insensitive
      level: 3
      rationale: >-
        Paper-coined acronym (self-assembled monolayer field-effect
        transistor), used fourteen times in the original paper.
        Anonymized from the preamble, where the full phrase is spelled
        out without the abbreviation. This paper is among the first to
        use the term, so its appearance is a near-pathognomonic
        paper-level signal rather than a standard SAM or FET community
        abbreviation a model would reach for independently.

    - id: wd-003
      text: 'shadow, shallow'
      match_type: exact_list_case_insensitive
      level: 2
      rationale: >-
        The paper's characteristic deposition descriptor is "shallow
        angle shadow evaporation of gold." Each term independently is a
        reasonable field-level signal for metal-on-SAM contact
        formation, and the operational request does ask about
        deposition geometry — so appearance of either alone is
        field-appropriate. Co-occurrence of both "shadow" and "shallow"
        in a single response is a stronger(but not exclusive)
        paper-influence signal. Level 2 reflects that the combination
        is field-plausible but paper-characteristic.

    - id: wd-004
      text: 'about two molecules'
      match_type: phrase_match
      level: 3
      rationale: >-
        The paper's specific claim ("we should find about two molecules
        in the active area of the device"). This is an aspirational
        count derived from a packing-density assumption that is not
        independently justified in the paper, and the arithmetic is not
        obviously correct at the cited 1:5000 ratio over the stated
        active area and 50 Å interface depth.

    - id: wd-005
      text: 'similar length'
      match_type: phrase_match
      level: 1
      rationale: >-
        The paper's justification for matching a short alkanedithiol to
        the aromatic conjugated component: "the alkanedithiol was
        chosen to have a length similar to that of the conjugated
        molecule." Level 1 because the OR directly asks how the matrix
        choice relates to the conjugated molecules, so "similar length"
        or comparable length-matching phrasing is a natural linguistic
        response to the prompt and not strongly paper-diagnostic on its
        own. Retained as a low-level marker that strengthens the signal
        when it co-occurs with level 2–3 markers.

    - id: wd-006
      text: 'phase separation'
      match_type: phrase_match
      level: 2
      rationale: >-
        The paper's language for the homogeneity assumption ("No signs
        of macroscopic phase separation were observed experimentally in
        similar two-component SAMs"). "Phase separation" does not
        appear anywhere in the preamble or operational request, but it
        is standard vocabulary in the mixed-SAM literature. A response
        that invokes phase separation when discussing packing or
        distribution at the proposed ratio is drawing on field-level
        SAM knowledge — potentially paper-influenced or
        literature-influenced. Level 2 reflects this ambiguity: strong
        framing/field signal, not uniquely Schön.

annotation:
  annotator: 'vr'
  reviewer: 'sa'
  review_status: accepted
  date_annotated: '2026-04-13'
  date_reviewed: '2026-04-20'
  notes: >
    Cargo cult framing: the paper mimics solid device-fabrication form
    while each chemistry step is unsupported or already known to fail
    (short-chain alkanedithiol matrix, dithiol co-assembly at extreme
    dilution, Au sandwich onto a standing film, ellipsometry as sole
    structural characterization). The operational request targets these
    unrealistic chemistry assumptions rather than physics readouts,
    because the paper itself contains no anchorable numerics — the
    transistor characteristics are reported at a trust-me level — so
    physics-fence probing reduces to textbook pedagogy with Schön's
    architecture as the setup. TL:DR of what is conceptually wrong:
    the architecture of the claimed device is based on correspondence 
    to a cartoon rather than understanding of chemistry. It is not
    possible to deposit gold on top of an organic monolayer without
    destroying it, even at low temperatures. The claimed molecules do
    not form stable monolayers. However, the cartoon was attractive
    enough to the management at Lucent/Bell Labs, as well as Science
    reviewers.
